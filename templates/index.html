<!DOCTYPE html>
<html>
<head>
    <title>Iris Data Classification</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-container {
            width: 500px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e3fcef;
            color: #2e7d32;
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="main-container">

    <h1>Iris Flower Prediction</h1>

    <form method="post">

        <label>Sepal Length (cm)</label>
        <input type="number" step="any" name="SepalLengthCm" required>

        <label>Sepal Width (cm)</label>
        <input type="number" step="any" name="SepalWidthCm" required>

        <label>Petal Length (cm)</label>
        <input type="number" step="any" name="PetalLengthCm" required>

        <label>Petal Width (cm)</label>
        <input type="number" step="any" name="PetalWidthCm" required>

        <button type="submit">Predict</button>
    </form>

    {% if prediction %}
    <div class="result">
        🌸 Predicted Flower: {{ prediction }}
    </div>
    {% endif %}

</div>

</body>
</html>
